<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN CASA</title>
    <style>
        :root { --primary: #1a1a2e; }
        body { margin: 0; background: var(--primary); color: #fff; font-family: sans-serif; }
        header { padding: 30px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 12px; max-width: 800px; margin: auto; }
        .tile { background: rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; text-decoration: none; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .tile img { width: 100%; height: 140px; object-fit: cover; display: block; }
        .tile p { padding: 10px; font-size: 14px; margin: 0; }
    </style>
</head>
<body>
    <header><h1>URBAN CASA</h1></header>
    <div class="grid" id="tileGrid"></div>
    <script>
        const DATA_URL = "https://furniture-catalogue-5beec-default-rtdb.firebaseio.com/catalogue.json";
        fetch(DATA_URL).then(res => res.json()).then(data => {
            document.getElementById('tileGrid').innerHTML = data.map(item => `
                <a href="${item.link}" class="tile" target="_blank">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300'">
                    <p>${item.name}</p>
                </a>
            `).join('');
        });
    </script>
</body>
</html>
